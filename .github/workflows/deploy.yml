name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "24" # 🟢 Ganti ke 24 biar bebas dari warning

      - name: "📦 Install Dependencies"
        run: npm install

      # ==========================================
      # 🛡️ QUALITY GATE (SATPAM KODE)
      # ==========================================

      - name: "🚨 Quality Gate 1: Typecheck (Vue & TS)"
        run: npx vue-tsc --noEmit

      - name: "🚨 Quality Gate 2: Sync Database Migration"
        # 🟢 Hapus flag --batch, cukup --remote saja
        run: npx wrangler d1 migrations apply masjidnurulhuda-db --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      # ==========================================
      # 🚀 DEPLOYMENT
      # ==========================================

      - name: "🌐 Build & Deploy to Cloudflare Pages"
        run: npm run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
