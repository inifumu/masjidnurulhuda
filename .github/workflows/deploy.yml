name: Deploy to Cloudflare

on:
  push:
    branches:
      - main # Robot jalan otomatis saat push ke branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        run: npm install

      # ==========================================
      # 🛡️ QUALITY GATE (SATPAM KODE)
      # ==========================================
      
      - name: 🚨 Quality Gate 1: Typecheck (Vue & TS)
        run: npx vue-tsc --noEmit

      - name: 🚨 Quality Gate 2: Sync Database Migration
        # Menggunakan nama DB masjidnurulhuda-db
        run: npx wrangler d1 migrations apply masjidnurulhuda-db --remote --batch
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      # ==========================================
      # 🚀 DEPLOYMENT
      # ==========================================

      - name: 🌐 Build & Deploy to Cloudflare Pages
        # Pastikan perintah di package.json sesuai (biasanya wrangler pages deploy)
        run: npm run deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}